services:

  # ── First-run workspace setup ──────────────────────────────────────────────
  # Renders config templates and copies the sidecar before any other service
  # starts. Runs to completion and exits; other services depend on it.
  setup:
    build:
      context: ..
      dockerfile: planck_docker/planck/Dockerfile
    image: ghcr.io/alexdesousa/planck:0.1.3
    entrypoint: ["/setup.sh"]
    volumes:
      - ${PLANCK_HOME:-${HOME}/planck}/workspace:/workspace
    environment:
      LLAMA_CTX_SIZE: ${LLAMA_CTX_SIZE:-32768}
      LLAMA_PORT: ${LLAMA_PORT:-11434}
      SEARXNG_SECRET: ${SEARXNG_SECRET}
      SEARXNG_LANGUAGE: ${SEARXNG_LANGUAGE:-en}

  # ── Planck web UI + agent runtime + sidecar ────────────────────────────────
  planck:
    build:
      context: ..
      dockerfile: planck_docker/planck/Dockerfile
    image: ghcr.io/alexdesousa/planck:0.1.3
    hostname: planck
    ports:
      - "${PLANCK_BIND_ADDRESS:-127.0.0.1}:4000:4000"
    volumes:
      - ${PLANCK_HOME:-${HOME}/planck}/workspace:/workspace
    environment:
      WORKSPACE_DIR: /workspace
      TYPESENSE_URL: http://typesense:8108
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY}
      TYPESENSE_COLLECTION: ${TYPESENSE_COLLECTION:-workspace}
      SEARXNG_URL: http://searxng:8080
      TIKA_URL: http://tika:9998
      LLAMA_CTX_SIZE: ${LLAMA_CTX_SIZE:-32768}
      LLAMA_PORT: ${LLAMA_PORT:-11434}
      SEARXNG_SECRET: ${SEARXNG_SECRET}
      SEARXNG_LANGUAGE: ${SEARXNG_LANGUAGE:-en}
    depends_on:
      setup:
        condition: service_completed_successfully
      typesense:
        condition: service_started
      searxng:
        condition: service_started
      tika:
        condition: service_started
      llama-cpp:
        condition: service_started
    restart: unless-stopped

  # ── Bonsai 1-bit LLM (CPU) ─────────────────────────────────────────────────
  llama-cpp:
    build:
      context: ..
      dockerfile: planck_docker/llama-cpu/Dockerfile
    image: ghcr.io/alexdesousa/planck-llama:0.1.3-cpu
    volumes:
      - ${PLANCK_HOME:-${HOME}/planck}/models:/models
    environment:
      LLAMA_THREADS: ${LLAMA_THREADS:-8}
      LLAMA_CTX_SIZE: ${LLAMA_CTX_SIZE:-32768}
      LLAMA_PORT: ${LLAMA_PORT:-11434}
      LLAMA_SLEEP_IDLE_SECONDS: ${LLAMA_SLEEP_IDLE_SECONDS:-600}
    restart: unless-stopped

  # ── Privacy-respecting web search ──────────────────────────────────────────
  searxng:
    image: searxng/searxng:2026.5.17-d7e8b7cd1
    volumes:
      - ${PLANCK_HOME:-${HOME}/planck}/workspace/.planck/searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      SEARXNG_SECRET: ${SEARXNG_SECRET}
      SEARXNG_LANGUAGE: ${SEARXNG_LANGUAGE:-en}
    depends_on:
      setup:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Workspace file indexing ────────────────────────────────────────────────
  typesense:
    image: typesense/typesense:29.1
    environment:
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY}
    volumes:
      - ${PLANCK_HOME:-${HOME}/planck}/typesense-data:/data
    command: --data-dir /data --api-key ${TYPESENSE_API_KEY} --enable-cors
    restart: unless-stopped

  # ── Document text extraction (PDF, DOCX, XLSX, …) ─────────────────────────
  tika:
    image: apache/tika:3.3.0.0-full
    restart: unless-stopped


name: Release

on:
  push:
    tags:
      - "v*"

env:
  HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

# ── Hex.pm publish ────────────────────────────────────────────────────────────
# Published in dependency order so each package is available on Hex before the
# next one tries to resolve it.

jobs:
  publish-ai:
    name: Publish planck_ai
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: planck_ai
    env:
      MIX_ENV: dev
    steps:
      - uses: actions/checkout@v5

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.5"

      - name: Install dependencies
        run: mix do local.rebar --force + local.hex --force + deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Publish to Hex.pm
        run: |
          VERSION=$(cat ../VERSION | tr -d '[:space:]')
          PKG=$(grep '@app' mix.exs | head -1 | sed 's/.*:\([a-z_]*\).*/\1/')
          if curl -sf "https://hex.pm/api/packages/${PKG}/releases/${VERSION}" > /dev/null; then
            mix hex.publish --yes --replace
          else
            mix hex.publish --yes
          fi

  publish-agent:
    name: Publish planck_agent
    runs-on: ubuntu-latest
    needs: publish-ai
    defaults:
      run:
        working-directory: planck_agent
    env:
      MIX_ENV: dev
    steps:
      - uses: actions/checkout@v5

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.5"

      - name: Install dependencies
        run: mix do local.rebar --force + local.hex --force + deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Publish to Hex.pm
        run: |
          VERSION=$(cat ../VERSION | tr -d '[:space:]')
          PKG=$(grep '@app' mix.exs | head -1 | sed 's/.*:\([a-z_]*\).*/\1/')
          if curl -sf "https://hex.pm/api/packages/${PKG}/releases/${VERSION}" > /dev/null; then
            mix hex.publish --yes --replace
          else
            mix hex.publish --yes
          fi

  publish-headless:
    name: Publish planck_headless
    runs-on: ubuntu-latest
    needs: publish-agent
    defaults:
      run:
        working-directory: planck_headless
    env:
      MIX_ENV: dev
    steps:
      - uses: actions/checkout@v5

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.5"

      - name: Install dependencies
        run: mix do local.rebar --force + local.hex --force + deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Publish to Hex.pm
        run: |
          VERSION=$(cat ../VERSION | tr -d '[:space:]')
          PKG=$(grep '@app' mix.exs | head -1 | sed 's/.*:\([a-z_]*\).*/\1/')
          if curl -sf "https://hex.pm/api/packages/${PKG}/releases/${VERSION}" > /dev/null; then
            mix hex.publish --yes --replace
          else
            mix hex.publish --yes
          fi

# ── Binary builds ─────────────────────────────────────────────────────────────
# Each platform builds natively so erlexec's exec-port has the correct arch.
# Assets (CSS/JS) are compiled per runner — the tooling (esbuild/tailwind) is
# platform-specific even though the output is not.

  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    needs: publish-headless
    defaults:
      run:
        working-directory: planck_cli
    steps:
      - uses: actions/checkout@v5
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.5"
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: "0.15.2"
      - uses: actions/setup-node@v4
        with:
          node-version: "25.9.0"
      - run: sudo apt-get install -y xz-utils p7zip-full
      - run: mix do local.rebar --force + local.hex --force + deps.get
        env:
          MIX_ENV: prod
      - run: mix deps.compile
        env:
          MIX_ENV: dev
      - run: mix do assets.setup + assets.deploy
        env:
          MIX_ENV: dev
      - run: mix release planck
        env:
          MIX_ENV: prod
      - uses: actions/upload-artifact@v4
        with:
          name: planck-linux
          path: planck_cli/burrito_out/planck_linux

  build-macos-arm:
    name: Build macOS arm64
    runs-on: macos-14
    needs: publish-headless
    defaults:
      run:
        working-directory: planck_cli
    steps:
      - uses: actions/checkout@v5
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.5"
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: "0.15.2"
      - uses: actions/setup-node@v4
        with:
          node-version: "25.9.0"
      - run: brew install xz p7zip
      - run: mix do local.rebar --force + local.hex --force + deps.get
        env:
          MIX_ENV: prod
      - run: mix deps.compile
        env:
          MIX_ENV: dev
      - run: mix do assets.setup + assets.deploy
        env:
          MIX_ENV: dev
      - run: mix release planck
        env:
          MIX_ENV: prod
      - uses: actions/upload-artifact@v4
        with:
          name: planck-macos-arm
          path: planck_cli/burrito_out/planck_macos_arm

  build-windows:
    name: Build Windows x86_64
    runs-on: windows-latest
    needs: publish-headless
    defaults:
      run:
        working-directory: planck_cli
    steps:
      - uses: actions/checkout@v5
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.5"
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: "0.15.2"
      - uses: actions/setup-node@v4
        with:
          node-version: "25.9.0"
      - run: choco install 7zip -y
      - run: echo "C:\Program Files\Git\usr\bin" >> $env:GITHUB_PATH
      - run: mix do local.rebar --force + local.hex --force + deps.get
        env:
          MIX_ENV: prod
      - run: mix deps.compile
        env:
          MIX_ENV: dev
      - run: mix do tailwind.install --if-missing + esbuild.install --if-missing
        env:
          MIX_ENV: dev
      - run: npm install
        working-directory: planck_cli/assets
      - run: mix assets.deploy
        env:
          MIX_ENV: dev
      - run: mix release planck
        env:
          MIX_ENV: prod
      - uses: actions/upload-artifact@v4
        with:
          name: planck-windows
          path: planck_cli/burrito_out/planck_windows.exe

# ── GitHub Release ─────────────────────────────────────────────────────────────

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos-arm, build-windows]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: binaries/planck_*
          draft: false
          prerelease: false

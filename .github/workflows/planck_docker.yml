name: planck_docker Checks

on:
  push:
    branches: [main]
    paths:
      - "planck_docker/**"
    tags:
      - "v*"
  pull_request:
    paths:
      - "planck_docker/**"

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  sidecar:
    runs-on: ubuntu-latest
    name: "Sidecar OTP ${{ matrix.otp }} / Elixir ${{ matrix.elixir }}"
    defaults:
      run:
        working-directory: planck_docker/sidecar
    strategy:
      matrix:
        otp: ["28.5"]
        elixir: ["1.19.5"]
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v5
        name: Checkout repository
      - uses: erlef/setup-beam@v1
        name: Setup Elixir
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}
      - uses: actions/setup-node@v4
        name: Setup Node.js
        with:
          node-version: "20"
      - name: Setup (deps.get + npm install --prefix assets)
        run: mix do local.rebar --force + local.hex --force + setup
      - name: Compile dependencies
        run: mix deps.compile
      - name: Check formatting
        run: mix format --dry-run --check-formatted
      - name: Compile project
        run: mix compile --warnings-as-errors
      - name: Run Credo
        run: mix credo
      - name: Run tests
        run: mix test --exclude integration

  dialyzer:
    runs-on: ubuntu-latest
    name: "Sidecar Dialyzer OTP ${{ matrix.otp }} / Elixir ${{ matrix.elixir }}"
    defaults:
      run:
        working-directory: planck_docker/sidecar
    strategy:
      matrix:
        otp: ["28.5"]
        elixir: ["1.19.5"]
    env:
      MIX_ENV: dev
    steps:
      - uses: actions/checkout@v5
        name: Checkout repository
      - uses: erlef/setup-beam@v1
        name: Setup Elixir
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}
      - uses: actions/cache@v4
        name: Retrieve cached PLT
        id: plt-cache
        with:
          path: planck_docker/sidecar/priv/plts
          key: ${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-sidecar-plts-${{ hashFiles('planck_docker/sidecar/mix.lock') }}
      - name: Get dependencies
        run: mix do local.rebar --force + local.hex --force + deps.get
      - name: Compile dependencies
        run: mix deps.compile
      - name: Run Dialyzer
        run: mix dialyzer

  # ── Docker image builds (tag pushes only) ─────────────────────────────────

  docker-planck:
    name: Build & push planck image
    runs-on: ubuntu-latest
    needs: [sidecar, dialyzer]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (for arm64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push planck image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: planck_docker/planck/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/alexdesousa/planck:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-llama:
    name: Build & push planck-llama image
    runs-on: ubuntu-latest
    needs: [sidecar, dialyzer]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (for arm64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push planck-llama image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: planck_docker/llama-cpu/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/alexdesousa/planck-llama:${{ steps.version.outputs.version }}-cpu
          cache-from: type=gha
          cache-to: type=gha,mode=max
